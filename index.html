<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  .story-wrap {
    display: flex;
    justify-content: center;
    padding: 12px 0;
  }
  .story {
    width: 360px;
    height: 640px;
    background: #0D0D0D;
    border-radius: 18px;
    position: relative;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    flex-direction: column;
  }
  .deco-orb {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }

  /* TOP SECTION */
  .top-section {
    padding: 32px 28px 0;
    position: relative;
    z-index: 2;
  }
  .brand-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .brand-name {
    color: rgba(255,255,255,0.9);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .early-badge {
    background: rgba(255,69,0,0.15);
    border: 1px solid rgba(255,69,0,0.4);
    color: #FF6633;
    font-size: 9px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 100px;
    letter-spacing: 1.5px;
  }

  /* HERO */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 28px;
    position: relative;
    z-index: 2;
  }
  .demon-big {
    font-size: 72px;
    line-height: 1;
    margin-bottom: 18px;
    filter: drop-shadow(0 0 28px rgba(255,69,0,0.55));
  }
  .hero-headline {
    color: #fff;
    font-size: 30px;
    font-weight: 900;
    text-align: center;
    line-height: 1.25;
    letter-spacing: -0.8px;
    margin-bottom: 10px;
  }
  .hero-headline .fire {
    color: #FF4500;
  }
  .hero-sub {
    color: rgba(255,255,255,0.42);
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 0;
  }

  /* DIVIDER */
  .divider {
    margin: 22px 28px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,69,0,0.35), transparent);
    position: relative;
    z-index: 2;
  }

  /* REVIEW LIST */
  .review-section {
    padding: 0 28px;
    flex: 1;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .rv {
    border-radius: 10px;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .rv.ad {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
  }
  .rv.real {
    background: rgba(255,69,0,0.11);
    border: 1px solid rgba(255,69,0,0.32);
  }
  .rv-icon { font-size: 15px; flex-shrink: 0; }
  .rv-text {
    font-size: 12px;
    line-height: 1.4;
    flex: 1;
  }
  .rv.ad .rv-text { color: rgba(255,255,255,0.22); text-decoration: line-through; }
  .rv.real .rv-text { color: rgba(255,255,255,0.9); }
  .rv-tag {
    font-size: 8px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .tag-ad { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); }
  .tag-real { background: rgba(255,69,0,0.2); color: #FF6633; }

  /* STAT ROW */
  .stat-row {
    display: flex;
    gap: 8px;
    padding: 0 28px;
    margin-top: 14px;
    position: relative;
    z-index: 2;
  }
  .stat-box {
    flex: 1;
    background: rgba(255,69,0,0.08);
    border: 1px solid rgba(255,69,0,0.2);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-num {
    color: #FF4500;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-label {
    color: rgba(255,255,255,0.35);
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  /* CTA */
  .cta-section {
    padding: 16px 28px 28px;
    position: relative;
    z-index: 2;
  }
  .cta-btn {
    width: 100%;
    background: #FF4500;
    color: #fff;
    font-size: 14px;
    font-weight: 900;
    padding: 15px 0;
    border-radius: 100px;
    text-align: center;
    letter-spacing: 0.5px;
    box-sizing: border-box;
  }
  .cta-note {
    text-align: center;
    color: rgba(255,255,255,0.2);
    font-size: 10px;
    margin-top: 9px;
    letter-spacing: 0.3px;
  }
</style>
